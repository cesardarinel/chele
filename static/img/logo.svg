<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- outer coin -->
  <circle cx="50" cy="50" r="42" fill="#164E63"/>
  <circle cx="50" cy="50" r="39" fill="#1A6B84"/>
  <circle cx="50" cy="50" r="36" fill="#164E63"/>
  <!-- inner glow -->
  <circle cx="50" cy="50" r="32" fill="url(#g)"/>
  <!-- dollar sign -->
  <text x="50" y="58" text-anchor="middle" font-size="36" fill="#F1F5F9" font-weight="bold" font-family="sans-serif">$</text>
  <!-- highlight -->
  <ellipse cx="38" cy="38" rx="14" ry="10" fill="rgba(255,255,255,0.08)" transform="rotate(-30 38 38)"/>
  <defs>
    <radialGradient id="g" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#1A6B84"/>
      <stop offset="100%" stop-color="#0F3A48"/>
    </radialGradient>
  </defs>
</svg>
