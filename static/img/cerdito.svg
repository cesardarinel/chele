<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- body -->
  <ellipse cx="50" cy="58" rx="30" ry="24" fill="#F59E0B"/>
  <ellipse cx="50" cy="58" rx="28" ry="22" fill="#FDE68A"/>
  <!-- ears -->
  <ellipse cx="32" cy="32" rx="6" ry="8" fill="#EC4899" transform="rotate(-15 32 32)"/>
  <ellipse cx="68" cy="32" rx="6" ry="8" fill="#EC4899" transform="rotate(15 68 32)"/>
  <ellipse cx="33" cy="33" rx="3" ry="5" fill="#F59E0B"/>
  <ellipse cx="67" cy="33" rx="3" ry="5" fill="#F59E0B"/>
  <!-- eyes -->
  <circle cx="38" cy="52" r="3" fill="#1C1917"/>
  <circle cx="62" cy="52" r="3" fill="#1C1917"/>
  <circle cx="39" cy="50" r="1" fill="white"/>
  <circle cx="63" cy="50" r="1" fill="white"/>
  <!-- cheeks -->
  <ellipse cx="30" cy="60" rx="5" ry="3" fill="rgba(236,72,153,0.15)"/>
  <ellipse cx="70" cy="60" rx="5" ry="3" fill="rgba(236,72,153,0.15)"/>
  <!-- snout -->
  <ellipse cx="50" cy="63" rx="8" ry="5" fill="#EC4899"/>
  <circle cx="46" cy="63" r="1.5" fill="#BE185D"/>
  <circle cx="54" cy="63" r="1.5" fill="#BE185D"/>
  <!-- mouth -->
  <path d="M44 69 Q50 74 56 69" stroke="#BE185D" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- legs -->
  <rect x="30" y="76" width="8" height="10" rx="3" fill="#F59E0B"/>
  <rect x="62" y="76" width="8" height="10" rx="3" fill="#F59E0B"/>
  <!-- tail -->
  <path d="M78 56 Q86 50 84 44 Q82 38 76 42" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- coin slot -->
  <rect x="44" y="28" width="12" height="4" rx="2" fill="#D97706"/>
  <!-- coin -->
  <circle cx="50" cy="22" r="5" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
  <text x="50" y="24" text-anchor="middle" font-size="6" fill="#1C1917" font-weight="bold">$</text>
</svg>
