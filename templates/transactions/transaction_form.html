{% extends 'base.html' %}
{% block title %}Nueva transacción{% endblock %}
{% block content %}
<div class="px-4 md:px-6 py-5 max-w-lg mx-auto">
    <h2 class="text-lg md:text-xl font-bold text-chele-text mb-6 flex items-center gap-2">Nueva transacción</h2>
    <form method="post" class="bg-chele-surface rounded-lg border border-chele-border p-4 md:p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Tipo</label>
            <div class="flex gap-4">
                <label class="flex items-center gap-2 text-sm">
                    <input type="radio" name="direction" value="expense" checked onchange="document.getElementById('amountInput').dataset.sign='-'">
                    <span>Gasto</span>
                </label>
                <label class="flex items-center gap-2 text-sm">
                    <input type="radio" name="direction" value="income" onchange="document.getElementById('amountInput').dataset.sign='+'">
                    <span>Ingreso</span>
                </label>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Cuenta</label>
            <select name="account_id" required class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
                {% for a in active_budget.accounts.all %}
                <option value="{{ a.id }}" {% if request.GET.account == a.id|slugify %}selected{% endif %}>{{ a.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Fecha</label>
            <input type="date" name="date" required class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Monto</label>
            <input type="number" step="0.01" name="amount" id="amountInput" required class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text" placeholder="0.00">
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Beneficiario</label>
            <select name="payee_id" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
                <option value="">—</option>
                {% for p in active_budget.payees.all %}
                <option value="{{ p.id }}">{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Categoría</label>
            <select name="category_id" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
                <option value="">—</option>
                <optgroup label="💰 Ingresos">
                {% for cat in active_budget.categories.all %}
                {% if cat.group.is_income %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endif %}
                {% endfor %}
                </optgroup>
                <optgroup label="💸 Gastos">
                {% for cat in active_budget.categories.all %}
                {% if not cat.group.is_income %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endif %}
                {% endfor %}
                </optgroup>
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Notas</label>
            <textarea name="notes" rows="2" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text"></textarea>
        </div>
        <div>
            <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" name="is_transfer" onchange="document.getElementById('transferTarget').classList.toggle('hidden')">
                <span>Es una transferencia</span>
            </label>
        </div>
        <div id="transferTarget" class="hidden">
            <label class="block text-sm font-medium text-chele-text mb-1">Cuenta destino</label>
            <select name="to_account_id" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
                <option value="">Seleccionar cuenta</option>
                {% for a in active_budget.accounts.all %}
                <option value="{{ a.id }}">{{ a.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn-primary w-full text-center py-2.5">Guardar transacción</button>
    </form>
</div>
{% endblock %}
