{% extends 'base.html' %}
{% block title %}Beneficiarios{% endblock %}
{% block content %}
<div class="px-4 md:px-6 py-5">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg md:text-xl font-bold text-chele-text">Beneficiarios</h2>
        <a href="{% url 'payee_create' %}" class="btn-primary text-xs md:text-sm">+ Nuevo</a>
    </div>
    <div class="bg-chele-surface rounded-lg border border-chele-border overflow-hidden">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-chele-border bg-chele-bg-secondary/50">
                    <th class="text-left px-4 py-3 text-xs font-semibold text-chele-text-secondary">Nombre</th>
                    <th class="text-right px-4 py-3"></th>
                </tr>
            </thead>
            <tbody>
                {% for payee in payees %}
                <tr class="border-b border-chele-border hover:bg-chele-bg-tertiary/30 transition">
                    <td class="px-4 py-3 text-sm text-chele-text">{{ payee.name }}</td>
                    <td class="px-4 py-3 text-right">
                        <a href="{% url 'payee_edit' payee.id %}" class="text-xs text-amber-400 hover:text-amber-300 mr-3">Editar</a>
                        <a href="{% url 'payee_merge' payee.id %}" class="text-xs text-chele-text-secondary hover:text-chele-text">Fusionar</a>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="2" class="px-4 py-8 text-center text-chele-text-secondary text-sm">No hay beneficiarios.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
