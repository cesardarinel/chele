{% load static %}<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chele — Acceder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    chele: { primary: '#164E63', 'primary-dark': '#0F3A48', bg: '#0F172A', surface: '#1E293B', text: '#F1F5F9', 'text-secondary': '#94A3B8', 'text-muted': '#64748B', border: '#334155', danger: '#DC2626' }
                }
            }
        }
    }
    </script>
    <link rel="icon" href="{% static 'img/logo.svg' %}">
</head>
<body class="bg-chele-bg flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <img src="{% static 'img/logo.svg' %}" alt="Chele" class="w-20 h-20 mx-auto">
            <h1 class="text-3xl font-bold text-chele-text mt-3">Chele</h1>
            <p class="text-chele-text-secondary mt-1">Tomá el control de tu dinero</p>
        </div>
        <div class="bg-chele-surface rounded-xl border border-chele-border p-6">
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="block text-sm font-medium text-chele-text mb-1">Email</label>
                    <input type="email" name="username" required class="w-full bg-chele-bg border border-chele-border rounded-lg px-3 py-2.5 text-sm focus:border-chele-primary focus:ring-1 focus:ring-chele-primary text-chele-text">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-chele-text mb-1">Contraseña</label>
                    <input type="password" name="password" required class="w-full bg-chele-bg border border-chele-border rounded-lg px-3 py-2.5 text-sm focus:border-chele-primary focus:ring-1 focus:ring-chele-primary text-chele-text">
                </div>
                {% if form.errors %}
                <div class="mb-4 p-3 bg-red-900/20 text-chele-danger rounded-lg text-sm border border-red-900/30">Email o contraseña incorrectos.</div>
                {% endif %}
                <button type="submit" class="w-full bg-chele-primary text-white rounded-lg py-2.5 text-sm font-medium hover:bg-chele-primary-dark transition">Acceder</button>
            </form>
            <p class="mt-4 text-sm text-center text-chele-text-secondary">
                ¿No tenés cuenta? <a href="{% url 'register' %}" class="text-chele-primary hover:text-chele-primary-dark font-medium">Registrate</a>
            </p>
        </div>
    </div>
</body>
</html>
