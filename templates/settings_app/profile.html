{% extends 'base.html' %}
{% block title %}Perfil{% endblock %}
{% block content %}
<div class="px-4 md:px-6 py-5 max-w-lg mx-auto">
    <h2 class="text-lg md:text-xl font-bold text-chele-text mb-6">🐷 Mi perfil</h2>
    <form method="post" class="bg-chele-surface rounded-lg border border-chele-border p-4 md:p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Nombre</label>
            <input type="text" name="name" value="{{ user.first_name }}" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Email</label>
            <input type="email" name="email" value="{{ user.email }}" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Nueva contraseña (dejar vacío para no cambiar)</label>
            <input type="password" name="password" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
        </div>
        <button type="submit" class="btn-primary w-full text-center py-2.5">🐷 Guardar</button>
    </form>
</div>
{% endblock %}
