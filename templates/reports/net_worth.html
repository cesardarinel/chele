{% extends 'base.html' %}
{% block title %}Patrimonio Neto{% endblock %}
{% block content %}
<div class="px-4 md:px-6 py-5">
    <h2 class="text-lg md:text-xl font-bold text-chele-text mb-6">Patrimonio Neto</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-chele-surface rounded-lg border border-chele-border p-4 md:p-6">
            <p class="text-xs md:text-sm text-chele-text-secondary">Activos</p>
            <p class="text-xl md:text-2xl font-bold text-chele-success">${{ assets|currency }}</p>
        </div>
        <div class="bg-chele-surface rounded-lg border border-chele-border p-4 md:p-6">
            <p class="text-xs md:text-sm text-chele-text-secondary">Pasivos</p>
            <p class="text-xl md:text-2xl font-bold text-chele-danger">${{ liabilities|currency }}</p>
        </div>
        <div class="bg-chele-surface rounded-lg border border-chele-border p-4 md:p-6">
            <p class="text-xs md:text-sm text-chele-text-secondary">Patrimonio Neto</p>
            <p class="text-xl md:text-2xl font-bold text-amber-400">${{ net_worth|currency }}</p>
        </div>
    </div>
</div>
{% endblock %}
