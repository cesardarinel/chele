{% extends 'base.html' %}
{% block title %}Eliminar cuenta{% endblock %}
{% block content %}
<div class="px-4 md:px-6 py-5 max-w-lg mx-auto text-center">
    <div class="bg-white rounded-lg border border-chele-border p-6 md:p-8">
        <p class="text-4xl mb-3">🐷</p>
        <h2 class="text-lg md:text-xl font-bold text-chele-text mb-2">¿Eliminar "{{ account.name }}"?</h2>
        <p class="text-sm text-chele-text-secondary mb-6">Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="px-6 py-2.5 bg-chele-danger text-white rounded-lg text-sm font-medium hover:bg-red-600 transition">Eliminar</button>
            <a href="{% url 'account_detail' account.id %}" class="ml-3 text-sm text-chele-text-secondary hover:text-chele-text">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
