{% extends 'base.html' %}
{% block title %}Nueva tarjeta de crédito{% endblock %}
{% block content %}
<div class="px-4 md:px-6 py-5 max-w-lg mx-auto">
    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
        <span>🐷</span> Nueva tarjeta de crédito
    </h2>
    <form method="post" class="bg-white rounded-lg border border-gray-200 p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
            <input type="text" name="name" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Ej: Visa, Mastercard">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Límite</label>
                <input type="number" step="0.01" name="limit" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Saldo actual</label>
                <input type="number" step="0.01" name="balance" value="0" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
        </div>
        <div class="grid grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tasa anual (%)</label>
                <input type="number" step="0.01" name="interest_rate" value="96" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Ej: 96 para 96% anual">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Día cierre</label>
                <input type="number" min="1" max="28" name="closing_day" value="15" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Día vencimiento</label>
                <input type="number" min="1" max="28" name="due_day" value="5" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Notas</label>
            <textarea name="notes" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"></textarea>
        </div>
        <button type="submit" class="btn-primary w-full text-center py-2.5">🐷 Crear tarjeta</button>
    </form>
</div>
{% endblock %}
