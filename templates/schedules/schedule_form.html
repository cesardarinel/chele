{% extends 'base.html' %}
{% block title %}{% if schedule %}Editar{% else %}Nueva{% endif %} programación{% endblock %}
{% block content %}
<div class="px-4 md:px-6 py-5 max-w-lg mx-auto">
    <h2 class="text-lg md:text-xl font-bold text-chele-text mb-6">{% if schedule %}Editar{% else %}Nueva{% endif %} programación</h2>
    <form method="post" class="bg-chele-surface rounded-lg border border-chele-border p-4 md:p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Beneficiario</label>
            <select name="payee_id" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
                <option value="">—</option>
                {% for p in active_budget.payees.all %}
                <option value="{{ p.id }}" {% if schedule.payee_id == p.id %}selected{% endif %}>{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Categoría</label>
            <select name="category_id" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
                <option value="">—</option>
                {% for cat in active_budget.categories.all %}
                <option value="{{ cat.id }}" {% if schedule.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Cuenta</label>
            <select name="account_id" required class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
                {% for a in active_budget.accounts.all %}
                <option value="{{ a.id }}" {% if schedule.account_id == a.id %}selected{% endif %}>{{ a.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-2">Dirección</label>
            <div class="flex gap-4">
                <label class="flex items-center gap-2 text-sm text-chele-text cursor-pointer">
                    <input type="radio" name="direction" value="expense" {% if schedule.direction == 'expense' or not schedule %}checked{% endif %} class="text-red-500">
                    <span class="text-chele-danger">Gasto</span>
                </label>
                <label class="flex items-center gap-2 text-sm text-chele-text cursor-pointer">
                    <input type="radio" name="direction" value="income" {% if schedule.direction == 'income' %}checked{% endif %} class="text-chele-success">
                    <span class="text-chele-success">Ingreso</span>
                </label>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-chele-text mb-1">Monto</label>
                <input type="number" step="0.01" name="amount" value="{{ schedule.amount|default:'' }}" required class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
            </div>
            <div>
                <label class="block text-sm font-medium text-chele-text mb-1">Frecuencia</label>
                <select name="frequency" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
                    <option value="weekly" {% if schedule.frequency == 'weekly' %}selected{% endif %}>Semanal</option>
                    <option value="biweekly" {% if schedule.frequency == 'biweekly' %}selected{% endif %}>Quincenal</option>
                    <option value="monthly" {% if schedule.frequency == 'monthly' %}selected{% endif %}>Mensual</option>
                    <option value="quarterly" {% if schedule.frequency == 'quarterly' %}selected{% endif %}>Trimestral</option>
                    <option value="yearly" {% if schedule.frequency == 'yearly' %}selected{% endif %}>Anual</option>
                </select>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Próxima fecha</label>
            <input type="date" name="next_date" value="{{ schedule.next_date|date:'Y-m-d'|default:'' }}" required class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Notas</label>
            <textarea name="notes" rows="2" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">{{ schedule.notes|default:'' }}</textarea>
        </div>
        <div class="space-y-2">
            <label class="block text-sm font-medium text-chele-text mb-1">Ajuste de fin de semana</label>
            <label class="flex items-center gap-2 text-sm cursor-pointer bg-chele-bg rounded-lg px-3 py-2 border border-chele-border hover:border-chele-border-light">
                <input type="radio" name="weekend_adjust" value="none" {% if not schedule.skip_weekends and not schedule.apply_before_weekend %}checked{% endif %} class="text-amber-400" onchange="toggleWeekend()">
                <span>No ajustar</span>
            </label>
            <label class="flex items-center gap-2 text-sm cursor-pointer bg-chele-bg rounded-lg px-3 py-2 border border-chele-border hover:border-chele-border-light">
                <input type="radio" name="weekend_adjust" value="after" {% if schedule.skip_weekends %}checked{% endif %} class="text-amber-400" onchange="toggleWeekend()">
                <span>Pasar al <strong>lunes siguiente</strong> (si cae sábado/domingo)</span>
            </label>
            <label class="flex items-center gap-2 text-sm cursor-pointer bg-chele-bg rounded-lg px-3 py-2 border border-chele-border hover:border-chele-border-light">
                <input type="radio" name="weekend_adjust" value="before" {% if schedule.apply_before_weekend %}checked{% endif %} class="text-amber-400" onchange="toggleWeekend()">
                <span>Pasar al <strong>viernes anterior</strong> (si cae sábado/domingo)</span>
            </label>
        </div>
        <input type="hidden" name="skip_weekends" id="skipWeekendsInput" value="{% if schedule.skip_weekends %}on{% endif %}">
        <input type="hidden" name="apply_before_weekend" id="applyBeforeInput" value="{% if schedule.apply_before_weekend %}on{% endif %}">
        <button type="submit" class="btn-primary w-full text-center py-2.5">Guardar</button>
    </form>
</div>
<script>
function toggleWeekend() {
    var sel = document.querySelector('input[name="weekend_adjust"]:checked');
    if (!sel) return;
    document.getElementById('skipWeekendsInput').value = sel.value === 'after' ? 'on' : '';
    document.getElementById('applyBeforeInput').value = sel.value === 'before' ? 'on' : '';
}
document.addEventListener('DOMContentLoaded', toggleWeekend);
</script>
{% endblock %}
