<div id="onboardingOverlay" class="fixed inset-0 z-[100] flex items-center justify-center" style="display:none; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);" onclick="event.target===this && onboarding.close()">
    <div id="onboardingCoachContainer" class="relative w-full max-w-md mx-4">
        <div id="onboardingCoachBody" class="bg-chele-surface rounded-xl shadow-2xl border border-chele-border p-6 relative">
            <div class="flex items-center gap-2 mb-1">
                <span id="onboardingStepBadge" class="text-xs font-bold text-amber-400 bg-amber-400/10 rounded-full px-2.5 py-0.5">1/7</span>
                <span id="onboardingStepTitle" class="text-xs text-chele-text-secondary font-medium">Bienvenido</span>
            </div>
            <div id="onboardingCoachContent" class="text-sm text-chele-text space-y-3 min-h-[120px]"></div>
            <div class="mt-4 pt-3 border-t border-chele-border flex items-center justify-between">
                <button id="onboardingBackBtn" onclick="onboarding.back()" class="text-xs text-chele-text-secondary hover:text-chele-text px-2 py-1">Atrás</button>
                <div class="flex items-center gap-2">
                    <button id="onboardingSkipBtn" class="text-xs text-chele-text-secondary hover:text-chele-text px-2 py-1">Omitir</button>
                    <button id="onboardingNextBtn" class="text-xs bg-chele-primary text-white rounded-lg px-4 py-2 font-medium hover:bg-chele-primary-dark disabled:opacity-40 disabled:cursor-not-allowed" disabled>Siguiente</button>
                </div>
            </div>
        </div>
        {# Progress bar #}
        <div class="mt-3 flex gap-1 justify-center">
            {% for i in "1234567"|make_list %}
            <div class="h-1.5 w-6 rounded-full transition-colors duration-300 {% if forloop.counter0 < onboarding_step %}bg-chele-success{% else %}bg-chele-border{% endif %}" data-step="{{ forloop.counter }}"></div>
            {% endfor %}
        </div>
    </div>
</div>
