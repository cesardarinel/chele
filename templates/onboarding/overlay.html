<div id="cheleGuideOverlay" class="fixed inset-0 z-[100] flex items-center justify-center" style="display:none; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px);" onclick="event.target===this && cheleGuide.hide()">
    <div class="relative w-full max-w-sm mx-4">
        <div id="cheleGuideBody" class="bg-chele-surface rounded-xl shadow-2xl border border-chele-border p-5">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <span id="cheleGuideBadge" class="text-lg">💰</span>
                    <span id="cheleGuideTitle" class="text-xs font-semibold text-chele-text-secondary uppercase tracking-wider">Guía</span>
                </div>
                <button onclick="cheleGuide.hide()" class="text-gray-400 hover:text-gray-300 text-lg">✕</button>
            </div>
            <div id="cheleGuideContent" class="text-sm text-chele-text space-y-2 mb-4 min-h-[80px]"></div>
            <div class="flex items-center justify-between gap-3">
                <button id="cheleGuideDismissBtn" onclick="cheleGuide.hide()" class="text-xs text-chele-text-secondary hover:text-chele-text px-2 py-1">Recordármelo después</button>
                <button id="cheleGuideNextBtn" class="text-xs bg-chele-primary text-white rounded-lg px-4 py-2 font-medium hover:bg-chele-primary-dark disabled:opacity-40 disabled:cursor-not-allowed">Cerrar</button>
            </div>
        </div>
    </div>
</div>
