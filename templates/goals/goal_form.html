{% extends 'base.html' %}
{% block title %}Nueva Meta{% endblock %}
{% block content %}
<div class="px-4 md:px-6 py-5 max-w-lg mx-auto">
    <h2 class="text-lg md:text-xl font-bold text-chele-text mb-6">🐷 {% if goal %}Editar{% else %}Nueva{% endif %} meta</h2>
    <form method="post" class="bg-chele-surface rounded-lg border border-chele-border p-4 md:p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Categoría</label>
            <select name="category_id" required class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
                {% for cat in active_budget.categories.all %}
                <option value="{{ cat.id }}" {% if goal and goal.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-chele-text mb-1">Tipo de meta</label>
            <select name="goal_type" required class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
                <option value="monthly">Ahorro mensual</option>
                <option value="target_balance">Saldo objetivo</option>
                <option value="target_date">Objetivo con fecha</option>
                <option value="true_expense">Gasto anual</option>
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-chele-text mb-1">Monto</label>
                <input type="number" step="0.01" name="amount" value="{{ goal.amount|default:'' }}" required class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
            </div>
            <div>
                <label class="block text-sm font-medium text-chele-text mb-1">Fecha objetivo</label>
                <input type="date" name="target_date" value="{{ goal.target_date|date:'Y-m-d'|default:'' }}" class="w-full border border-chele-border rounded-lg px-3 py-2 text-sm bg-chele-bg text-chele-text">
            </div>
        </div>
        <button type="submit" class="btn-primary w-full text-center py-2.5">🐷 Guardar meta</button>
    </form>
</div>
{% endblock %}
