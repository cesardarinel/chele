services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - sqlite_data:/app
      - static_volume:/app/staticfiles
    command: gunicorn chele.wsgi:application --bind 0.0.0.0:8000 --workers 3
    restart: unless-stopped

volumes:
  sqlite_data:
  static_volume:
